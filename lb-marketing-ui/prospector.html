<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Prospector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: #dee2e6;
      --text: #212529;
      --text-muted: #6c757d;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc3545;
      --score-high: #15803d;
      --score-high-bg: #dcfce7;
      --score-med: #b45309;
      --score-med-bg: #fef3c7;
      --score-low: #6b7280;
      --score-low-bg: #f3f4f6;
      --radius: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 24px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .header .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }

    input[type="text"], input[type="password"], select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="password"]:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover:not(:disabled) { background: var(--bg); }

    .toggle-group {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .toggle-group button {
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-group button.active {
      background: var(--primary);
      color: #fff;
    }
    .toggle-group button:not(:last-child) { border-right: 1px solid var(--border); }

    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      font-size: 0.875rem;
      display: none;
    }

    .status-bar {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .progress-text { font-size: 0.8rem; color: var(--text-muted); }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid var(--border);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--text); }
    thead th .sort-arrow { margin-left: 4px; font-size: 0.65rem; }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tbody tr:hover { background: #f8fafc; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-high { background: var(--score-high-bg); color: var(--score-high); }
    .badge-medium { background: var(--score-med-bg); color: var(--score-med); }
    .badge-low { background: var(--score-low-bg); color: var(--score-low); }

    .stars { color: #f59e0b; letter-spacing: 1px; }

    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .api-key-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    #yelp-key-field { display: none; }

    .proxy-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: auto;
    }
    .proxy-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #d1d5db;
    }
    .proxy-dot.ok { background: #22c55e; }
    .proxy-dot.fail { background: var(--danger); }

    .truncate { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @media (max-width: 768px) {
      .form-row, .api-key-row { flex-direction: column; }
      .field { width: 100%; }
      input[type="text"], input[type="password"] { width: 100%; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Lead Prospector</h1>
  <span class="subtitle">Find local business prospects with weak digital presence</span>
  <span class="proxy-status">
    <span class="proxy-dot" id="proxy-dot"></span>
    <span id="proxy-label">Checking proxy...</span>
  </span>
</div>

<div class="card">
  <div class="api-key-row">
    <div class="field">
      <label>Data Source</label>
      <div class="toggle-group">
        <button class="active" data-source="google" onclick="setSource('google')">Google Places</button>
        <button data-source="yelp" onclick="setSource('yelp')">Yelp Fusion</button>
      </div>
    </div>
    <div class="field" id="google-key-field" style="flex:1; min-width:220px;">
      <label>Google Places API Key</label>
      <input type="password" id="google-api-key" placeholder="Enter your Google API key" />
    </div>
    <div class="field" id="yelp-key-field" style="flex:1; min-width:220px;">
      <label>Yelp Fusion API Key</label>
      <input type="password" id="yelp-api-key" placeholder="Enter your Yelp API key" />
    </div>
  </div>

  <div class="form-row">
    <div class="field" style="flex:1; min-width:180px;">
      <label>Business Category</label>
      <input type="text" id="category" placeholder='e.g. "restaurants", "salons"' />
    </div>
    <div class="field" style="flex:1; min-width:180px;">
      <label>City / Location</label>
      <input type="text" id="location" placeholder='e.g. "Austin, TX"' />
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="btn btn-primary" id="search-btn" onclick="runSearch()">
        <span id="search-btn-text">Search</span>
      </button>
    </div>
  </div>
</div>

<div class="error-banner" id="error-banner"></div>

<div id="results-area" style="display:none;">
  <div class="status-bar">
    <span id="result-count"></span>
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="progress-text" id="progress-text"></span>
      <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <div class="card" style="padding:0; overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('name')">Name <span class="sort-arrow" id="sort-name"></span></th>
          <th onclick="sortBy('address')">Address <span class="sort-arrow" id="sort-address"></span></th>
          <th onclick="sortBy('rating')">Rating <span class="sort-arrow" id="sort-rating"></span></th>
          <th onclick="sortBy('reviews')">Reviews <span class="sort-arrow" id="sort-reviews"></span></th>
          <th onclick="sortBy('website')">Website <span class="sort-arrow" id="sort-website"></span></th>
          <th onclick="sortBy('phone')">Phone <span class="sort-arrow" id="sort-phone"></span></th>
          <th onclick="sortBy('score')">Lead Score <span class="sort-arrow" id="sort-score"></span></th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>
</div>

<div class="empty-state" id="empty-state">
  <div class="icon">&#128269;</div>
  <div>Enter a category and location to find prospects</div>
</div>

<script>
  const PROXY = 'http://localhost:3001';

  let currentSource = 'google';
  let results = [];
  let sortField = 'score';
  let sortAsc = false;

  function setSource(source) {
    currentSource = source;
    document.querySelectorAll('.toggle-group button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.source === source);
    });
    document.getElementById('google-key-field').style.display = source === 'google' ? 'flex' : 'none';
    document.getElementById('yelp-key-field').style.display = source === 'yelp' ? 'flex' : 'none';
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-banner').style.display = 'none';
  }

  function computeLeadScore(biz) {
    let weakSignals = 0;
    if (biz.rating != null && biz.rating < 4.2) weakSignals++;
    if (biz.rating == null) weakSignals++;
    if (biz.reviews != null && biz.reviews < 50) weakSignals++;
    if (biz.reviews == null) weakSignals++;
    if (!biz.website) weakSignals++;

    if (weakSignals >= 3) return { label: 'High', rank: 3 };
    if (weakSignals === 2) return { label: 'Medium', rank: 2 };
    return { label: 'Low', rank: 1 };
  }

  function setProgress(msg) {
    document.getElementById('progress-text').textContent = msg;
  }

  // --- Google Places API ---

  async function searchGoogle() {
    const apiKey = document.getElementById('google-api-key').value.trim();
    if (!apiKey) { showError('Please enter your Google Places API key.'); return; }

    const category = document.getElementById('category').value.trim();
    const location = document.getElementById('location').value.trim();
    if (!category || !location) { showError('Please enter both a category and a location.'); return; }

    hideError();
    setProgress('Searching...');

    const query = `${category} in ${location}`;
    const textSearchUrl = `${PROXY}/google/textsearch?query=${encodeURIComponent(query)}&key=${encodeURIComponent(apiKey)}`;

    let searchData;
    try {
      const res = await fetch(textSearchUrl);
      searchData = await res.json();
    } catch (e) {
      throw new Error('Network error — is the proxy server running? Start it with: node proxy-server.js');
    }

    if (searchData.status !== 'OK' && searchData.status !== 'ZERO_RESULTS') {
      throw new Error(`Google API error: ${searchData.status} — ${searchData.error_message || 'Unknown error'}`);
    }

    const places = searchData.results || [];
    if (places.length === 0) {
      throw new Error('No results found. Try a different category or location.');
    }

    const basicResults = places.map(p => ({
      name: p.name,
      address: p.formatted_address || '',
      rating: p.rating ?? null,
      reviews: p.user_ratings_total ?? null,
      website: null,
      phone: null,
      placeId: p.place_id,
    }));

    setProgress(`Found ${basicResults.length} places. Fetching details (0/${basicResults.length})...`);
    results = basicResults;
    results.forEach(r => { const s = computeLeadScore(r); r.scoreLabel = s.label; r.scoreRank = s.rank; });
    renderResults();

    for (let i = 0; i < basicResults.length; i++) {
      setProgress(`Fetching details (${i + 1}/${basicResults.length})...`);
      try {
        const detailUrl = `${PROXY}/google/details?place_id=${encodeURIComponent(basicResults[i].placeId)}&key=${encodeURIComponent(apiKey)}`;
        const dRes = await fetch(detailUrl);
        const dData = await dRes.json();
        if (dData.result) {
          basicResults[i].website = dData.result.website || null;
          basicResults[i].phone = dData.result.formatted_phone_number || null;
          const s = computeLeadScore(basicResults[i]);
          basicResults[i].scoreLabel = s.label;
          basicResults[i].scoreRank = s.rank;
        }
      } catch (_) {
        // Details failed for this place — keep basic info
      }
      results = basicResults;
      renderResults();
    }

    setProgress('');
    return basicResults;
  }

  // --- Yelp Fusion API ---

  async function searchYelp() {
    const apiKey = document.getElementById('yelp-api-key').value.trim();
    if (!apiKey) { showError('Please enter your Yelp Fusion API key.'); return; }

    const category = document.getElementById('category').value.trim();
    const location = document.getElementById('location').value.trim();
    if (!category || !location) { showError('Please enter both a category and a location.'); return; }

    hideError();
    setProgress('Searching Yelp...');

    const yelpUrl = `${PROXY}/yelp/search?term=${encodeURIComponent(category)}&location=${encodeURIComponent(location)}&key=${encodeURIComponent(apiKey)}`;

    let data;
    try {
      const res = await fetch(yelpUrl);
      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        throw new Error(errBody.error?.description || errBody.error || `HTTP ${res.status}`);
      }
      data = await res.json();
    } catch (e) {
      throw new Error(`Yelp API error: ${e.message}. Is the proxy server running? Start it with: node proxy-server.js`);
    }

    const businesses = data.businesses || [];
    if (businesses.length === 0) {
      throw new Error('No results found on Yelp. Try a different category or location.');
    }

    const mapped = businesses.map(b => {
      const biz = {
        name: b.name,
        address: (b.location?.display_address || []).join(', '),
        rating: b.rating ?? null,
        reviews: b.review_count ?? null,
        website: b.url || null,
        phone: b.display_phone || null,
      };
      const s = computeLeadScore(biz);
      biz.scoreLabel = s.label;
      biz.scoreRank = s.rank;
      return biz;
    });

    setProgress('');
    return mapped;
  }

  // --- Search orchestration ---

  async function runSearch() {
    const btn = document.getElementById('search-btn');
    const btnText = document.getElementById('search-btn-text');
    btn.disabled = true;
    btnText.innerHTML = '<span class="spinner"></span> Searching';
    hideError();

    try {
      let data;
      if (currentSource === 'google') {
        data = await searchGoogle();
      } else {
        data = await searchYelp();
      }
      if (data) {
        results = data;
        sortField = 'score';
        sortAsc = false;
        applySort();
        document.getElementById('results-area').style.display = '';
        document.getElementById('empty-state').style.display = 'none';
      }
    } catch (e) {
      showError(e.message);
    } finally {
      btn.disabled = false;
      btnText.textContent = 'Search';
      setProgress('');
    }
  }

  // --- Sorting ---

  const sortKeyFn = {
    name:    r => (r.name || '').toLowerCase(),
    address: r => (r.address || '').toLowerCase(),
    rating:  r => r.rating ?? -1,
    reviews: r => r.reviews ?? -1,
    website: r => r.website ? 0 : 1,
    phone:   r => r.phone ? 0 : 1,
    score:   r => r.scoreRank,
  };

  function sortBy(field) {
    if (sortField === field) {
      sortAsc = !sortAsc;
    } else {
      sortField = field;
      sortAsc = field === 'name' || field === 'address';
    }
    applySort();
  }

  function applySort() {
    const fn = sortKeyFn[sortField] || sortKeyFn.score;
    results.sort((a, b) => {
      const va = fn(a), vb = fn(b);
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
    renderResults();
    updateSortArrows();
  }

  function updateSortArrows() {
    document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
    const arrow = document.getElementById(`sort-${sortField}`);
    if (arrow) arrow.textContent = sortAsc ? '▲' : '▼';
  }

  // --- Rendering ---

  function starsHtml(rating) {
    if (rating == null) return '<span style="color:var(--text-muted)">N/A</span>';
    const full = Math.floor(rating);
    const half = rating - full >= 0.5;
    let html = '';
    for (let i = 0; i < full; i++) html += '★';
    if (half) html += '½';
    return `<span class="stars">${html}</span> <span style="color:var(--text-muted)">${rating}</span>`;
  }

  function scoreBadge(label) {
    const cls = label === 'High' ? 'badge-high' : label === 'Medium' ? 'badge-medium' : 'badge-low';
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function renderResults() {
    const tbody = document.getElementById('results-body');
    document.getElementById('result-count').textContent = `${results.length} result${results.length !== 1 ? 's' : ''}`;

    tbody.innerHTML = results.map(r => `
      <tr>
        <td><strong>${esc(r.name)}</strong></td>
        <td class="truncate" title="${esc(r.address)}">${esc(r.address)}</td>
        <td>${starsHtml(r.rating)}</td>
        <td>${r.reviews != null ? r.reviews.toLocaleString() : '<span style="color:var(--text-muted)">N/A</span>'}</td>
        <td>${r.website ? `<a href="${esc(r.website)}" target="_blank" class="truncate" style="display:block;max-width:180px;">${esc(hostOf(r.website))}</a>` : '<span style="color:var(--text-muted)">None</span>'}</td>
        <td>${r.phone ? esc(r.phone) : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td>${scoreBadge(r.scoreLabel)}</td>
      </tr>
    `).join('');
  }

  function hostOf(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
  }

  function esc(str) {
    if (!str) return '';
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  // --- CSV Export ---

  function exportCSV() {
    if (!results.length) return;
    const headers = ['Name', 'Address', 'Rating', 'Reviews', 'Website', 'Phone', 'Lead Score'];
    const rows = results.map(r => [
      r.name, r.address, r.rating ?? '', r.reviews ?? '', r.website ?? '', r.phone ?? '', r.scoreLabel
    ]);
    const csv = [headers, ...rows]
      .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
      .join('\n');

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const loc = document.getElementById('location').value.trim() || 'results';
    const cat = document.getElementById('category').value.trim() || 'leads';
    a.download = `prospects-${cat.replace(/\s+/g, '_')}-${loc.replace(/\s+/g, '_')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // Enter key triggers search
  document.getElementById('category').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
  document.getElementById('location').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });

  // Proxy health check
  async function checkProxy() {
    const dot = document.getElementById('proxy-dot');
    const label = document.getElementById('proxy-label');
    try {
      const res = await fetch(`${PROXY}/health-check-ping`, { signal: AbortSignal.timeout(2000) });
      dot.className = 'proxy-dot ok';
      label.textContent = 'Proxy connected';
    } catch {
      dot.className = 'proxy-dot fail';
      label.textContent = 'Proxy offline — run: node proxy-server.js';
    }
  }
  checkProxy();
</script>
</body>
</html>
