# ══════════════════════════════════════════════════════════════════════════════
# LB Marketing — Client Pitch Deck Configuration
# ══════════════════════════════════════════════════════════════════════════════
#
# HOW TO USE:
#   1. Fill in every field below for your client
#   2. Run:  python build_deck.py
#   3. The .pptx will be saved to the output_filename path below
#
# TIPS:
#   - Use null (no quotes) to leave a field blank
#   - For vertical, set exactly ONE to true and the rest to false
#   - Competitor rows: add/remove entries under competitors (max 5 looks best)
#   - current_state and opportunity values support any short string
# ══════════════════════════════════════════════════════════════════════════════


# ── Output ────────────────────────────────────────────────────────────────────
output_filename: "LB_Marketing_Pitch_Fellom_Solorio_Law_Offices.pptx"
# Use [ClientName] as a placeholder — it will be replaced with client.name


# ── Your Agency Details (Slide 2, 12) ─────────────────────────────────────────
agency:
  name: "LB Marketing"
  tagline: "Local Digital Marketing — Results in 30 Days"
  location: "San Francisco, CA"
  presenter_name: "Anthony Omar Valenzuela"
  presenter_email: "anthony@lbmarketing.com"
  presenter_phone: "323-787-5671"
  website: "Under Development"


# ── Client Details (Slide 1, 3, 4, 7) ─────────────────────────────────────────
client:
  name: "Fellom & Solorio Law Offices"
  city_state: "San Francisco, CA"
  date: "March 2026"

  # Archetype: set ONE to true
  archetype_established_invisible: false
  archetype_present_underperforming: true
  archetype_mixed: false


# ── Vertical (Slide 6) ────────────────────────────────────────────────────────
# Set exactly ONE to true — the other two panels will be hidden
vertical:
  salons_spas: false
  legal_professional: true
  home_services: false


# ── Pricing (Slide 10) ────────────────────────────────────────────────────────
pricing:
  month1_price: "$200"
  growth_price: "$1,500/mo"
  scale_price: "$2,000/mo"


# ── Current State Audit (Slide 3 — left panel) ────────────────────────────────
# Use any short descriptive string for each value
current_state:
  gbp_status: "Claimed — incomplete"           # e.g. "Not claimed", "Incomplete", "Claimed"
  star_rating: "4.7 ★"
  review_count: "32 reviews"
  map_pack_rank: "Not ranked"
  website: "Yes"
  citation_consistency: "Consistent"
  last_review_response: "Never"


# ── Opportunity Analysis (Slide 3 — right panel) ──────────────────────────────
opportunity:
  map_pack_opportunity: "4 nearby competitors are optimised"
  review_gap: "Top competitor has 1441 reviews vs. your 32"
  keyword_gap: "'immigration law office San Francisco' — not in top 10"
  profile_completion: "Not complete"
  review_velocity: "Averaging 1 review/month — room to 10×"
  unanswered_reviews: "32 reviews with no owner response"
  quick_win_potential: "HIGH — GBP + reviews can move in 30 days"

# One-sentence key insight shown in the callout at the bottom of Slide 4
competitor_key_insight: "Fellom & Solorio Law Offices's rating (4.7) trails the competitor average (4.8). 4 of 4 competitors have more reviews (top: 1441 vs 32) — growing review volume is the fastest path to closing this gap."


# ── Local Competitor Table (Slide 4) ─────────────────────────────────────────
# Add up to 5 competitors (including your client as the first row)
# Fields: name, google_rating, review_count, map_pack, gbp_complete, website
